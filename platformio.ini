[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Configurações de upload
upload_speed = 921600
monitor_speed = 115200
monitor_encoding = utf-8

; Dependências necessárias para o ThermoWatch
lib_deps = 
    ; WiFiManager para portal captivo
    tzapu/WiFiManager@^2.0.17
    
    ; ArduinoJson para manipulação JSON
    bblanchon/ArduinoJson@^6.21.3
    
    ; Bibliotecas para compatibilidade (PT100 usa ADC diretamente)
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    
    ; HTTPClient já incluído no framework Arduino ESP32
    ; WiFi já incluído no framework Arduino ESP32
    ; Preferences já incluído no framework Arduino ESP32

; Configurações do compilador
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DWIFIMANAGER_DEBUG_LEVEL=DEBUG_VERBOSE
    -DCONFIG_ESP32_BROWNOUT_DET=0
    -DCONFIG_ESP32_BROWNOUT_DET_LVL0=0

; Configurações do monitor serial
monitor_filters = 
    esp32_exception_decoder
    time

[env:esp32dev_ota43]
platform = ${env:esp32dev.platform}
board = ${env:esp32dev.board}
framework = ${env:esp32dev.framework}
upload_speed = ${env:esp32dev.upload_speed}
monitor_speed = ${env:esp32dev.monitor_speed}
lib_deps = ${env:esp32dev.lib_deps}
monitor_filters = ${env:esp32dev.monitor_filters}
build_flags =
    ${env:esp32dev.build_flags}
    -DCURRENT_FIRMWARE_VERSION=\"4.3\"
